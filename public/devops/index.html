    <!-- Redirect script for SPA - works with spa-github-pages -->
    <script type="text/javascript">
      // Redirect to root with path in query string
      // Format: /?/path (required by spa-github-pages script)
      (function(l) {
        if (l.pathname.startsWith('/devops')) {
          // Remove trailing slash and redirect to /?/devops
          var path = l.pathname.replace(/\/$/, '');
          window.location.replace('/?' + path);
        }
      }(window.location));
    </script>
